<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Просмотр изображения</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      height: 100vh;
      color: white;
      font-family: sans-serif;
    }
    img {
      max-width: 95vw;
      max-height: 95vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      border-radius: 4px;
    }
    #loading {
      position: absolute;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div id="loading">Загрузка изображения...</div>
  <img id="img" style="display: none;" />
  <script src="viewer.js"></script>
</body>
</html>
