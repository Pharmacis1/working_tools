<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" data-tab="sd">Инциденты</div>
            <div class="tab" data-tab="tracker">Трекер Грузов</div>
            <div class="tab" data-tab="assistant">Ассистент</div>
        </div>
        
        <!-- Вкладка SD -->
        <div id="sd" class="tab-content active">
            <div class="input-group">
                <label for="ticketInput">Номер инцидента</label>
                <input type="text" id="ticketInput" placeholder="Введите номер..." autocomplete="off">
            </div>
            <button id="searchBtn">Перейти</button>
        </div>

        <!-- Вкладка Трекер -->
        <div id="tracker" class="tab-content">
            <div class="input-group">
                <label for="companySelect">Выберите Транспортную Компанию</label>
                <select id="companySelect">
                    <option value="cdek">СДЭК</option>
                    <option value="dellin">Деловые Линии</option>
                    <option value="dpd">DPD</option>
                    <option value="kce">КСЭ</option>
                    <option value="pony">Pony Express</option>
                    <option value="flippost">FLIPPOST</option>
                </select>
            </div>
            <div class="input-group">
                <label for="trackInput">Номер накладной / Трек-номер</label>
                <input type="text" id="trackInput" placeholder="Например: 12345678" autocomplete="off">
            </div>
            <button id="trackBtn">Отследить</button>
            <div class="footer-hint">Откроется в новой вкладке на сайте ТК</div>
        </div>

        <!-- Вкладка Ассистент -->
        <div id="assistant" class="tab-content">
            <div class="mode-switches" style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
                <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: #4b5563;">
                    <input type="radio" name="astMode" value="generate" checked>
                    Генерация ID
                </label>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: #4b5563;">
                    <input type="radio" name="astMode" value="links">
                    Ссылки РК
                </label>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: #4b5563;">
                    <input type="radio" name="astMode" value="format">
                    Номера ресторанов
                </label>
            </div>

            <div class="input-group" id="astInputGroup" style="display: none; margin-bottom: 12px;">
                <textarea id="astInput" rows="2" style="width: 100%; box-sizing: border-box; min-height: 60px;"></textarea>
            </div>

            <button id="astBtn">Сгенерировать ID шаблона</button>

            <div class="output-group" id="assistantOutputGroup" style="display: none; margin-top: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label style="margin: 0;">Результат</label>
                    <button id="btnCopyOutput" style="width: auto; padding: 4px 8px; font-size: 11px; background-color: #6b7280;">Копировать</button>
                </div>
                <div id="assistantOutput" style="font-size: 13px; background: #f9fafb; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px; white-space: pre-wrap; word-break: break-all;"></div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
